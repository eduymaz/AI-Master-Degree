name: yzm714-saglik-yz-etik

# ──────────────────────────────────────────────────────────
# Sağlık YZ Etik — Değerlendirme Platformu
#
# Tek komut başlatma:  docker compose up
#
# Ön koşul: .env dosyasında GROQ_API_KEY=gsk_...  (ücretsiz: https://console.groq.com)
#
# İlk açılış:    ~5–7 dk   (Docker image build + embedding model indirme)
# Sonraki açılış: ~20 sn
# Disk kullanımı: ~2.5 GB
#
# Tarayıcı: http://localhost:3000
# API docs: http://localhost:8000/docs
# ──────────────────────────────────────────────────────────

services:
  # ─── Backend (FastAPI + ChromaDB + RAG + Groq LLM) ───────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yzm714-backend
    ports:
      - "8000:8000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-base}
      CHROMA_PERSIST_DIR: /app/app/knowledge/chroma_db
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002
    volumes:
      - chroma_data:/app/app/knowledge/chroma_db
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 8s
      retries: 20
      start_period: 180s
    restart: unless-stopped

  # ─── Frontend (Next.js 15 + Tailwind + shadcn/ui) ─────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: yzm714-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ─── Ollama (opsiyonel — sadece offline/yerel LLM isterseniz) ─
  # Çalıştırmak için:  docker compose --profile offline up
  # ve .env'de LLM_PROVIDER=ollama yapın
  ollama:
    image: ollama/ollama:latest
    container_name: yzm714-ollama
    profiles: ["offline"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  chroma_data:
    name: yzm714_chroma_data
  hf_cache:
    name: yzm714_hf_cache
  ollama_data:
    name: yzm714_ollama_data
